<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffebd5"/>
      <stop offset="100%" stop-color="#fddfbe"/>
    </linearGradient>
    <linearGradient id="skinShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fddfbe"/>
      <stop offset="100%" stop-color="#f5b882"/>
    </linearGradient>
    <linearGradient id="hijabOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="hijabInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="blazerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Hijab back drape (shoulders background) -->
  <path d="M 52,110 C 40,140 46,160 62,170 C 72,170 85,150 100,150 C 115,150 128,170 138,170 C 154,160 160,140 148,110 Z" fill="url(#hijabOuter)"/>

  <!-- Neck / Collar part of Hijab -->
  <path d="M 75,108 C 75,135 125,135 125,108 C 125,120 75,120 75,108 Z" fill="url(#hijabInner)" opacity="0.9"/>
  <path d="M 80,105 C 80,138 120,138 120,105 Z" fill="url(#hijabOuter)"/>

  <!-- Face base (narrower than male, elegant chin) -->
  <path d="M 70,72 C 70,50 130,50 130,72 C 130,102 100,118 100,118 C 100,118 70,102 70,72 Z" fill="url(#skinGrad)"/>

  <!-- Hijab Inner Cap (Ciput) - visible on forehead -->
  <path d="M 72,66 C 85,52 115,52 128,66 C 120,58 80,58 72,66 Z" fill="url(#hijabInner)"/>

  <!-- Eyebrows (neatly arched and thinner) -->
  <path d="M 76,70 C 80,66 87,66 91,69" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <path d="M 124,70 C 120,66 113,66 109,69" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes (Detailed with eyelashes) -->
  <!-- Left Eye -->
  <path d="M 77,77 C 80,74 86,74 89,77 C 86,80 80,80 77,77 Z" fill="#ffffff" stroke="#334155" stroke-width="0.5"/>
  <circle cx="83" cy="77" r="4" fill="#0284c7"/>
  <circle cx="83" cy="77" r="2" fill="#0f172a"/>
  <circle cx="84.2" cy="75.8" r="0.8" fill="#ffffff"/>
  <path d="M 76,76 Q 83,70 90,76" fill="none" stroke="#1e293b" stroke-width="1.8" stroke-linecap="round"/> <!-- Eyelash curve -->
  
  <!-- Right Eye -->
  <path d="M 123,77 C 120,74 114,74 111,77 C 114,80 120,80 123,77 Z" fill="#ffffff" stroke="#334155" stroke-width="0.5"/>
  <circle cx="117" cy="77" r="4" fill="#0284c7"/>
  <circle cx="117" cy="77" r="2" fill="#0f172a"/>
  <circle cx="118.2" cy="75.8" r="0.8" fill="#ffffff"/>
  <path d="M 124,76 Q 117,70 110,76" fill="none" stroke="#1e293b" stroke-width="1.8" stroke-linecap="round"/> <!-- Eyelash curve -->

  <!-- Nose -->
  <path d="M 97,83 L 100,93 L 103,83" fill="none" stroke="url(#skinShadow)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Smile / Lips (Rose colored) -->
  <path d="M 85,101 C 90,107 110,107 115,101" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round"/>
  <path d="M 87,101 C 92,104 108,104 113,101" fill="none" stroke="#fda4af" stroke-width="1" stroke-linecap="round"/>

  <!-- Cheeks Blush -->
  <circle cx="74" cy="91" r="5" fill="#fda4af" opacity="0.4"/>
  <circle cx="126" cy="91" r="5" fill="#fda4af" opacity="0.4"/>

  <!-- Hijab Frame (Wrap around the face) -->
  <path d="M 70,72 C 68,60 76,46 100,46 C 124,46 132,60 130,72 C 128,88 123,108 120,118 C 110,128 90,128 80,118 C 77,108 72,88 70,72 Z" fill="none" stroke="url(#hijabOuter)" stroke-width="6"/>
  <path d="M 70,72 C 68,60 76,46 100,46 C 124,46 132,60 130,72 C 128,88 123,108 120,118 C 110,128 90,128 80,118 C 77,108 72,88 70,72 Z" fill="none" stroke="url(#hijabInner)" stroke-width="2"/>

  <!-- Professional Corporate Blazer (Pink/Magenta or Elegant Corporate Maroon) -->
  <path d="M 40,165 C 55,145 75,140 100,140 C 125,140 145,145 160,165 L 168,194 L 32,194 Z" fill="url(#blazerGrad)" filter="url(#shadow)"/>
  
  <!-- Blazer Lapels/V-Neck opening showing hijab drape inside -->
  <path d="M 82,140 L 100,175 L 118,140 Z" fill="none" stroke="#fbcfe8" stroke-width="1.5"/>
  <path d="M 80,140 L 100,178 L 65,194 Z" fill="#be185d"/>
  <path d="M 120,140 L 100,178 L 135,194 Z" fill="#be185d"/>
</svg>
